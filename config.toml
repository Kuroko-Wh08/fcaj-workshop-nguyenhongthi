baseURL = "https://Kuroko-Wh08.github.io/fcaj-workshop-nguyenhongthi/"
relativeURLs = true
canonifyURLs = false
defaultContentLanguage = "en"

# Change the default theme to be use when building the site with Hugo
theme = "hugo-theme-learn"

# For search functionality
[outputs]
home = [ "HTML", "RSS", "JSON"]

[params]
  # Change default color scheme with a variant one. Can be "red", "blue", "green".
  themeVariant = "workshop"
  # Git hub repo link
  editURL = ""
  description = "Nguyen Hong Thi - MalScanAI internship report and bilingual AWS workshop"
  author = "Nguyen Hong Thi"
  showVisitedLinks = false
  disableBreadcrumb = false
  disableNextPrev = false
  
[Languages]
[Languages.en]
title = "MalScanAI Internship Report"
weight = 1
languageName = "English"

[Languages.vi]
title = "Báo cáo thực tập MalScanAI"
weight = 2
languageName = "Tiếng Việt"




[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
